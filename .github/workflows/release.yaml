name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Zip Folder
        run: |
          zip -r kirin.zip Game.exe .nomedia kirin-touch-controls.json

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          fail_on_unmatched_files: true
          files: |
            kirin.zip
